name: Companion Functions CI

on:
  pull_request:
    paths:
      - "selfhost/functions/**"
      - ".github/workflows/functions-ci.yml"
  push:
    branches: [main]
    paths:
      - "selfhost/functions/**"
      - ".github/workflows/functions-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: selfhost/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: selfhost/functions/package-lock.json
      - run: npm ci
      - run: npm test
